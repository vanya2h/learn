name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version Packages
    runs-on: ubuntu-latest
    environment: main

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Exit pre-release mode
        run: |
          if [ -f .changeset/pre.json ]; then
            npx changeset pre exit
            git add .changeset/pre.json
            git commit -m "chore: exit pre-release mode [skip ci]"
          fi

      - name: Version packages
        run: npx changeset version

      - name: Push version bumps
        run: git push

      - name: Tag release
        run: |
          VERSION=$(node -p "require('./packages/web/package.json').version")
          git tag "v${VERSION}" -m "Release v${VERSION}" || true

      - name: Push release tags
        run: git push --follow-tags

      - name: Sync version bumps to staging and develop
        run: |
          for branch in staging develop; do
            git fetch origin $branch
            git checkout $branch
            git merge main --no-edit -X theirs
            git push origin $branch
          done

      - name: Deploy to production
        run: git push origin main:production --follow-tags
